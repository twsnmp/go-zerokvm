name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Cross-Compilers
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-linux-gnueabihf gcc-aarch64-linux-gnu libc6-dev-armhf-cross libc6-dev-arm64-cross

      - name: Setup mise
        uses: jdx/mise-action@v2

      - name: Build all variants
        run: mise run build:all

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/go-zerokvm-*
          generate_release_notes: true
