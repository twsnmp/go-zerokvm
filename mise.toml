[tools]
go = "1.25"

[tasks.test]
description = "Run unit tests"
run = "go test -v ./..."

[tasks."build:arm:nocgo"]
description = "Build for ARM 32-bit without CGO"
run = "go build -o dist/go-zerokvm-arm-nocgo"
env = { GOOS = "linux", GOARCH = "arm", GOARM = "7", CGO_ENABLED = "0" }

[tasks."build:arm:cgo"]
description = "Build for ARM 32-bit with CGO"
run = "go build -o dist/go-zerokvm-arm-cgo"
env = { GOOS = "linux", GOARCH = "arm", GOARM = "7", CGO_ENABLED = "1", CC = "arm-linux-gnueabihf-gcc" }

[tasks."build:arm64:nocgo"]
description = "Build for ARM 64-bit without CGO"
run = "go build -o dist/go-zerokvm-arm64-nocgo"
env = { GOOS = "linux", GOARCH = "arm64", CGO_ENABLED = "0" }

[tasks."build:arm64:cgo"]
description = "Build for ARM 64-bit with CGO"
run = "go build -o dist/go-zerokvm-arm64-cgo"
env = { GOOS = "linux", GOARCH = "arm64", CGO_ENABLED = "1", CC = "aarch64-linux-gnu-gcc" }

[tasks."build:all"]
description = "Build all variants"
depends = [
    "build:arm:nocgo",
    "build:arm:cgo",
    "build:arm64:nocgo",
    "build:arm64:cgo",
]
